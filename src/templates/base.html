<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            color: #1a1a1a;
            line-height: 1.4;
        }
        .page {
            padding: 10mm;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .company-name {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
        }
        .company-details {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
        }
        .doc-title {
            font-size: 16px;
            font-weight: 700;
            color: #2c3e50;
            text-align: right;
        }
        .doc-meta {
            font-size: 10px;
            text-align: right;
            color: #555;
            margin-top: 4px;
        }
        .section {
            margin-bottom: 14px;
        }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #2c3e50;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
            margin-bottom: 6px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .info-block label {
            font-size: 9px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-block p {
            font-size: 11px;
            margin-top: 1px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 6px;
        }
        th {
            background: #2c3e50;
            color: #fff;
            padding: 6px 8px;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
        }
        th:last-child, td:last-child { text-align: right; }
        td {
            padding: 5px 8px;
            border-bottom: 1px solid #eee;
            font-size: 10px;
        }
        tr:nth-child(even) td { background: #f8f9fa; }
        .totals-section {
            margin-top: 14px;
            display: flex;
            justify-content: flex-end;
        }
        .totals-table {
            width: 280px;
        }
        .totals-table td {
            padding: 4px 8px;
            border-bottom: 1px solid #eee;
        }
        .totals-table .grand-total td {
            font-weight: 700;
            font-size: 12px;
            border-top: 2px solid #2c3e50;
            border-bottom: none;
            padding-top: 6px;
        }
        .footer {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 9px;
            color: #777;
            display: flex;
            justify-content: space-between;
        }
        .chunk-info {
            text-align: center;
            font-size: 9px;
            color: #999;
            margin-bottom: 8px;
        }
        .terms {
            margin-top: 12px;
            font-size: 9px;
            color: #555;
        }
        .terms h4 {
            font-size: 10px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
