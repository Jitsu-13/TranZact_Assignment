version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PDF_STORAGE_DIR=/app/generated_pdfs
      - PLAYWRIGHT_BROWSER_POOL_SIZE=3
    volumes:
      - pdf_storage:/app/generated_pdfs
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A src.celery_app:celery_app worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PDF_STORAGE_DIR=/app/generated_pdfs
      - PLAYWRIGHT_BROWSER_POOL_SIZE=2
    volumes:
      - pdf_storage:/app/generated_pdfs
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  pdf_storage:
